name: Markdown Check

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  markdown-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Markdown Lint
        uses: avto-dev/markdown-lint@v1
